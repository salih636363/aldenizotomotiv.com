<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aldeniz Ticaret</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'EB Garamond', serif;
    }
    body, html {
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      animation: slideShow 6s infinite;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out;
    }
    @keyframes slideShow {
      0%   { background-image: url('istockphoto-1168967632-612x612.jpg'); }
      33%  { background-image: url('istockphoto-1468516363-612x612.jpg'); }
      66%  { background-image: url('istockphoto-1851891631-612x612.jpg'); }
      100% { background-image: url('istockphoto-1168967632-612x612.jpg'); }
    }
    .content {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      color: black;
      text-shadow: none;
    }
    .content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .contact-button {
      padding: 15px 30px;
      font-size: 1.5rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .contact-info {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background-color: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
    }
    .contact-info a {
      color: #00ff00;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="content">
    <h1>Aldeniz Ticaret</h1>
    <button class="contact-button">Bizimle İletişime Geçin</button>
  </div>
  <div class="contact-info">
    <div>ahmetaldeniz34@gmail.com</div>
    <div><a href="https://wa.me/905464325876" target="_blank">WhatsApp: 0546 432 5876</a></div>
  </div>
</body>
</html>
