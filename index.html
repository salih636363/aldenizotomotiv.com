<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldeniz Otomotiv - Şase Sorgulama</title>
    <meta name="description" content="Şase (VIN) numarası ile araç bilgisi sorgulama. Aldeniz Otomotiv - Oto Yedek Parça.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #e63012;
            --primary-dark: #c42810;
            --dark: #0f1923;
            --darker: #0a1118;
            --card-bg: #162029;
            --card-border: #1e2d3a;
            --text: #e4e8ec;
            --text-muted: #7a8a99;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--dark);
            border-bottom: 1px solid var(--card-border);
            padding: 16px 0;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-contact {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .header-contact a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        .header-contact a:hover {
            color: var(--primary);
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .search-wrapper {
            width: 100%;
            max-width: 680px;
            text-align: center;
        }

        .search-wrapper h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
        }

        .search-wrapper h2 span {
            color: var(--primary);
        }

        .search-wrapper p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .search-box {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-family: 'Inter', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid var(--card-border);
            border-right: none;
            border-radius: 12px 0 0 12px;
            background: var(--card-bg);
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .search-box button {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0 12px 12px 0;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: var(--primary-dark);
        }

        .search-box button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .search-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Error */
        .error-msg {
            background: rgba(230, 48, 18, 0.1);
            border: 1px solid rgba(230, 48, 18, 0.3);
            color: #ff6b54;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Loading */
        .loading {
            display: none;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--card-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Results */
        .results {
            display: none;
            text-align: left;
        }

        .results.show {
            display: block;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .results-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        .results-header button {
            background: none;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .results-header button:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        .vehicle-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .vehicle-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .vehicle-vin {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .info-item {
            padding: 12px 16px;
            background: var(--darker);
            border-radius: 10px;
        }

        .info-item label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .search-wrapper h2 { font-size: 1.5rem; }
            .search-box { flex-direction: column; }
            .search-box input {
                border-right: 2px solid var(--card-border);
                border-bottom: none;
                border-radius: 12px 12px 0 0;
            }
            .search-box input:focus {
                border-color: var(--primary);
            }
            .search-box button { border-radius: 0 0 12px 12px; }
            .info-grid { grid-template-columns: 1fr 1fr; }
            .header-contact { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">A</div>
                <div class="logo-text">
                    <h1>Aldeniz Otomotiv</h1>
                    <span>Oto Yedek Parça</span>
                </div>
            </div>
            <div class="header-contact">
                <a href="tel:+905551234567">0555 123 45 67</a>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="search-wrapper">
        <h2>Şase <span>Sorgulama</span></h2>
        <p>Araç şase (VIN) numarasını girerek detaylı araç bilgilerine ulaşın</p>

        <div class="search-box">
            <input
                type="text"
                id="vinInput"
                placeholder="Şase numarası girin..."
                maxlength="17"
                autocomplete="off"
                spellcheck="false"
            >
            <button id="searchBtn" onclick="searchVIN()">Sorgula</button>
        </div>
        <div class="search-hint">17 haneli VIN numarasını girin &mdash; Örnek: WVWZZZ3CZWE123456</div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Araç bilgileri sorgulanıyor...</p>
        </div>

        <div class="results" id="results">
            <div class="results-header">
                <h3>Araç Bilgileri</h3>
                <button onclick="clearResults()">Temizle</button>
            </div>
            <div class="vehicle-card" id="vehicleCard"></div>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        &copy; 2026 Aldeniz Otomotiv &mdash; Tüm hakları saklıdır.
    </div>
</footer>

<script>
    const vinInput = document.getElementById('vinInput');
    const searchBtn = document.getElementById('searchBtn');
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const vehicleCard = document.getElementById('vehicleCard');

    vinInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchVIN();
    });

    vinInput.addEventListener('input', () => {
        vinInput.value = vinInput.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, '');
    });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
    }

    function hideError() {
        errorMsg.classList.remove('show');
    }

    function clearResults() {
        results.classList.remove('show');
        vehicleCard.innerHTML = '';
        vinInput.value = '';
        vinInput.focus();
    }

    async function searchVIN() {
        const vin = vinInput.value.trim();

        hideError();
        results.classList.remove('show');

        if (!vin) {
            showError('Lütfen bir şase numarası girin.');
            return;
        }

        if (vin.length !== 17) {
            showError('Şase numarası 17 haneli olmalıdır. Şu an ' + vin.length + ' hane girdiniz.');
            return;
        }

        searchBtn.disabled = true;
        loading.classList.add('show');

        try {
            const response = await fetch(
                `https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`
            );

            if (!response.ok) throw new Error('API yanıt vermedi.');

            const data = await response.json();
            const r = data.Results[0];

            if (r.ErrorCode && r.ErrorCode.split(',').every(c => c.trim() !== '0')) {
                showError('Geçersiz şase numarası veya araç bulunamadı. Lütfen kontrol edin.');
                return;
            }

            displayResults(vin, r);
        } catch (err) {
            showError('Bağlantı hatası. Lütfen tekrar deneyin.');
        } finally {
            searchBtn.disabled = false;
            loading.classList.remove('show');
        }
    }

    function displayResults(vin, r) {
        const make = r.Make || '—';
        const model = r.Model || '—';
        const year = r.ModelYear || '—';

        const fields = [
            { label: 'Marka', value: r.Make },
            { label: 'Model', value: r.Model },
            { label: 'Yıl', value: r.ModelYear },
            { label: 'Araç Tipi', value: r.VehicleType },
            { label: 'Gövde Tipi', value: r.BodyClass },
            { label: 'Motor Tipi', value: r.FuelTypePrimary },
            { label: 'Motor Hacmi (L)', value: r.DisplacementL },
            { label: 'Silindir Sayısı', value: r.EngineCylinders },
            { label: 'Beygir Gücü (HP)', value: r.EngineHP },
            { label: 'Şanzıman', value: r.TransmissionStyle },
            { label: 'Çekiş', value: r.DriveType },
            { label: 'Kapı Sayısı', value: r.Doors },
            { label: 'Üretim Ülkesi', value: r.PlantCountry },
            { label: 'Üretim Şehri', value: r.PlantCity },
            { label: 'Üretici', value: r.Manufacturer },
        ];

        const infoItems = fields
            .filter(f => f.value && f.value.trim && f.value.trim() !== '')
            .map(f => `
                <div class="info-item">
                    <label>${f.label}</label>
                    <span>${f.value}</span>
                </div>
            `).join('');

        vehicleCard.innerHTML = `
            <div class="vehicle-title">${year} ${make} ${model}</div>
            <div class="vehicle-vin">VIN: ${vin}</div>
            <div class="info-grid">${infoItems}</div>
        `;

        results.classList.add('show');
    }
</script>

</body>
</html>
